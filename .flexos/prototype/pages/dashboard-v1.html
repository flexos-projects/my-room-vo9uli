<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>My Projects | My Room</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script><script src="https://cdn.jsdelivr.net/npm/lucide-vue-next"></script><script src="https://unpkg.com/vue@3/dist/vue.global.js"></script><link rel="stylesheet" href="../shared/tokens.css"><link rel="stylesheet" href="../shared/components.css"><script src="../shared/mock-data.js"></script><style>body { font-family: 'Poppins', sans-serif; background-color: var(--neutral-light); color: var(--neutral-dark); }</style></head><body class="antialiased"><div id="app" class="flex h-screen bg-gray-50"><aside v-if="!isMobile" class="w-64 flex-shrink-0 bg-white border-r border-gray-200 flex flex-col"><div class="h-16 border-b flex items-center px-6"><a href="landing-v1.html" class="flex items-center gap-2"><div class="w-8 h-8 bg-pink-500 rounded-lg flex items-center justify-center"><i data-lucide="bed-double" class="text-white w-5 h-5"></i></div><span class="font-bold text-lg text-gray-800">My Room</span></a></div><nav class="flex-1 p-4 space-y-2"><a v-for="item in navigation" :href="item.href" :key="item.name" class="flex items-center gap-3 px-4 py-2 rounded-md text-sm font-medium transition-colors" :class="currentPage === item.id ? 'bg-pink-50 text-pink-600' : 'text-gray-600 hover:bg-gray-100'"><i :data-lucide="item.icon" class="w-5 h-5"></i><span>{{ item.name }}</span></a></nav><div class="p-4 border-t"><a href="landing-v1.html" class="flex items-center gap-3 px-4 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100"><i data-lucide="log-out" class="w-5 h-5"></i><span>Logout</span></a></div></aside><div class="flex-1 flex flex-col overflow-hidden"><header v-if="!isMobile" class="h-16 bg-white border-b flex items-center justify-end px-6"><div class="flex items-center gap-4"><span class="text-sm text-gray-600">Welcome, {{ user.name }}</span><div class="w-9 h-9 rounded-full bg-pink-200 flex items-center justify-center font-bold text-pink-700">{{ user.initials }}</div></div></header><main class="flex-1 overflow-y-auto p-4 md:p-8"><div class="container mx-auto"><div class="flex items-center justify-between mb-8"><h1 class="text-3xl font-bold text-gray-800">My Projects</h1><button class="btn btn-primary"><i data-lucide="plus" class="w-4 h-4 mr-2"></i><span>Create New Project</span></button></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"><div v-for="project in projects" :key="project.id" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden group"><a href="#" class="block"><img :src="project.thumbnail" :alt="project.name" class="w-full h-40 object-cover"><div class="p-4"><h3 class="font-semibold text-gray-800 truncate">{{ project.name }}</h3><p class="text-sm text-gray-500">Updated {{ project.updatedAt }}</p></div></a></div></div></div></main></div><nav v-if="isMobile" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 h-16 flex items-center justify-around z-50"><a v-for="item in navigation" :href="item.href" :key="item.name" class="flex flex-col items-center justify-center text-sm w-full h-full" :class="currentPage === item.id ? 'text-pink-600' : 'text-gray-600'"><i :data-lucide="item.icon" class="w-6 h-6 mb-1"></i><span>{{ item.name }}</span></a></nav></div><script>const { createApp, ref, onMounted, onUnmounted } = Vue;createApp({ setup() { const isMobile = ref(window.innerWidth < 768); const currentPage = ref('projects'); const projects = ref([]); const user = ref({ name: 'User', initials: 'U' }); const navigation = [ { id: 'projects', name: 'Projects', href: '#', icon: 'layout-grid' }, { id: 'inspiration', name: 'Inspiration', href: '#', icon: 'image' }, { id: 'settings', name: 'Settings', href: '#', icon: 'settings' }, ]; const checkScreenSize = () => { isMobile.value = window.innerWidth < 768; }; onMounted(() => { projects.value = MockData.projects; user.value = MockData.user; lucide.createIcons(); window.addEventListener('resize', checkScreenSize); }); onUnmounted(() => { window.removeEventListener('resize', checkScreenSize); }); return { isMobile, currentPage, projects, user, navigation }; }}).mount('#app');</script></body></html>
